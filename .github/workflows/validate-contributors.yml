name: Validate Contributors JSON

on:
  pull_request:
    paths:
      - "public/contributors.json"

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run validation
        run: node .github/scripts/validateContributors.js
